<div class="container">
    <div class="card main-card">

        <div class="row mb-3 align-items-center">
            <div class="col-md-8">
                <h2 class="card-title">Secuencias de Pasos</h2>
                <p class="card-subtitle">Gestiona las secuencias de pictogramas para los estudiantes</p>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-yellow">
                    <i class="bi bi-plus-lg me-1"></i> Nueva secuencia
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-custom mb-0">
                <thead>
                    <tr>
                        <th scope="col" style="width: 20%;">Título</th>
                        <th scope="col" style="width: 30%;">Descripción</th>
                        <th scope="col" style="width: 20%;">Categoría</th>
                        <th scope="col" class="text-center" style="width: 15%;">Número de Pasos</th>
                        <th scope="col" class="text-center" style="width: 20%;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    @for(sequence of sequenceList; track sequence){
                        <tr class="bg-white">
                        <td>{{sequence.title}}</td>
                        <td>{{sequence.description}}</td>
                        <td>{{sequence.categorie}}</td>
                        <td class="text-center"><span class="badge-steps">5</span></td>
                        <td class="text-center">
                            <button class="action-btn btn-copy"><i class="bi bi-files"></i></button>
                            <button class="action-btn btn-edit"><i class="bi bi-pencil-square"></i></button>
                            <button class="action-btn btn-delete"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>

        <div class="pagination-container">
            <a href="#" class="page-arrow"><i class="bi bi-arrow-left"></i></a>
            <div class="page-number">1</div>
            <a href="#" class="page-arrow"><i class="bi bi-arrow-right"></i></a>
        </div>

    </div>
</div>
