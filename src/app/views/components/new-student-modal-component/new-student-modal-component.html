<ng-template #modal let-modal>
    <div class="modal-header">
        <h5 class="modal-title">Nuevo Estudiante</h5>
        <button type="button" class="btn-close" aria-label="Cerrar" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
        <!-- Formulario de ejemplo -->
        <input class="form-control" placeholder="Nombre del estudiante">
    </div>
    <div class="modal-footer">
        <button class="btn btn-secondary" (click)="modal.dismiss()" [routerLink]="'/students'">Cancelar</button>
        <button class="btn btn-primary" (click)="modal.close()">Guardar</button>
    </div>
</ng-template>
