<div class="card-row mb-2" (click)="onRowClick($event)" style="cursor: pointer;">

    <div class="row align-items-center g-0 h-100">

        <div class="col-md-6 ps-4">
            <img src="images/studentIMG.jpg" alt="student image" class="img-fluid rounded-circle student-image me-3"
                width="36px">
            <span class="align-middle fw-medium text-dark-blue fs-5">{{ student()?.name }} {{
                student()?.lastName }}</span>
        </div>
        
        <div class="col-md-4 text-center">
            @if (loading) {
                <app-loading-component></app-loading-component>
            } @else {
                <span class="badge-steps">
                    {{ student()?.sequencesCount }} Secuencia{{ student()?.sequencesCount !== 1 ? 's' : '' }} asignada{{ student()?.sequencesCount !== 1 ? 's' :
                    '' }}
                </span>
            }
        </div>

        <div class="col-md-2 text-end pe-4">
            <app-action-buttons-component (onEdit)="editStudent()" (onAssignValuable)="assignValuable()"
                (onDelete)="deleteStudent()">
            </app-action-buttons-component>
        </div>

    </div>
</div>
