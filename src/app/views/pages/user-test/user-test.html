<h1>Pruebas usuarios</h1>


@for (user of userList; track $index) {
    <div>
        <strong>Usuario {{$index + 1}}:</strong> {{user.name}} {{user.last_name}} - {{user.email}} - Rol: {{user.role_id}}
    </div>
}

<button class="btn btn-primary-blue mt-4" (click)="abrirModal()">Agregar Usuario</button>

@if (crearUser) {
    <app-user-form-modal-component></app-user-form-modal-component>
}
