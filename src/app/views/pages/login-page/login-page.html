<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="card shadow-lg p-4 w-100" style="max-width: 420px; border-radius: 15px;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary-custom">Bienvenido</h2>
            <p class="text-muted">Introduce tus credenciales para acceder</p>
        </div>

        @if (errorMessage) {
        <div class="alert alert-danger d-flex align-items-center mb-3 py-2" role="alert">
            <small>{{ errorMessage }}</small>
            <button type="button" class="btn-close ms-auto" style="font-size: 0.5rem;"
                (click)="errorMessage = null"></button>
        </div>
        }

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control"
                    [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                    formControlName="email" placeholder="ejemplo@correo.com">
                <div class="invalid-feedback">
                    {{ getEmailErrorMessage() }}
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                        [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                        formControlName="password" placeholder="••••••••">
                    <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()" [disabled]="loginForm.get('password')?.value == ''">
                        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                    </button>
                    <div class="invalid-feedback">
                        La contraseña debe tener al menos 6 caracteres.
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-custom-primary w-100 py-2 shadow-sm"
                [disabled]="loginForm.invalid || isLoading">
                @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                <span>Conectando...</span>
                } @else {
                <span class="fw-bold">Iniciar Sesión</span>
                }
            </button>
        </form>
    </div>
</div>
